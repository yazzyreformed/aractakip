<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Araç Takip Sistemi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; display: flex; height: 100vh; }
        #map { flex: 3; height: 100vh; }
        #sidebar { flex: 1; padding: 20px; background: white; box-shadow: -2px 0 10px rgba(0,0,0,0.1); z-index: 1000; overflow-y: auto; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .stats { background: #ecf0f1; border-radius: 8px; padding: 15px; margin-top: 20px; }
        .stat-box { display: flex; justify-content: space-between; font-size: 18px; margin-bottom: 10px; font-weight: bold; }
        .speed { color: #2980b9; }
        .temp { color: #e67e22; }
        #alert-box { background: #e74c3c; color: white; padding: 15px; border-radius: 8px; margin-top: 20px; font-weight: bold; display: none; text-align: center; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { opacity: 1; } to { opacity: 0.6; } }
        .log-container { margin-top: 30px; }
        .log-list { list-style: none; padding: 0; font-family: monospace; font-size: 12px; color: #7f8c8d; }
        .log-list li { border-bottom: 1px solid #eee; padding: 5px 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar">
        <h2>🚗 Akıllı Araç Takip</h2>
        
        <div id="alert-box"></div>

        <div class="stats">
            <div class="stat-box"><span>Hız:</span> <span id="val-speed" class="speed">0 km/h</span></div>
            <div class="stat-box"><span>Motor Sıcaklığı:</span> <span id="val-temp" class="temp">0 °C</span></div>
            <div class="stat-box" style="font-size:14px; margin-top:20px; color:#95a5a6;"><span>Araç ID:</span> <span id="val-id">Bekleniyor...</span></div>
        </div>

        <div class="log-container">
            <h4>🛰️ Son AWS Logları</h4>
            <ul class="log-list" id="logs">
                <li>Bağlantı bekleniyor...</li>
            </ul>
        </div>
    </div>

    <!-- Leaflet JS ve Socket.IO -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <script>
        // Haritayı İstanbul Merkezli Başlat
        var map = L.map('map').setView([41.0422, 29.0060], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Arabayı Temsil Eden Özel İkon Seti
        var carIcon = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3204/3204933.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        var carMarker = L.marker([41.0422, 29.0060], {icon: carIcon}).addTo(map);

        // WebSocket ile Sunucudan Veri Dinleme
        const socket = io();

        socket.on('vehicleData', (data) => {
            // Marker Konumunu Güncelle
            var newLatLng = new L.LatLng(data.location.lat, data.location.lng);
            carMarker.setLatLng(newLatLng);
            map.panTo(newLatLng); // Harita kamerası aracı takip etsin

            // Sidebar İstatistiklerini Güncelle
            document.getElementById('val-id').innerText = data.vehicleId;
            document.getElementById('val-speed').innerText = data.speed + ' km/s';
            document.getElementById('val-temp').innerText = data.engineTemp + ' °C';

            // Alarm Durumu Kontrolü
            const alertBox = document.getElementById('alert-box');
            if(data.alert) {
                alertBox.innerText = data.alert;
                alertBox.style.display = 'block';
            } else {
                alertBox.style.display = 'none';
            }

            // Log Paneline Ekle
            const logs = document.getElementById('logs');
            const li = document.createElement('li');
            li.innerText = `[${new Date(data.timestamp).toLocaleTimeString()}] ${data.speed}km/s - ${data.location.lat.toFixed(4)},${data.location.lng.toFixed(4)}`;
            logs.prepend(li);
            if(logs.children.length > 10) logs.removeChild(logs.lastChild);
        });
    </script>
</body>
</html>
